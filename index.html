<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomo — Study Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:    #1a1a2e;
    --bw:     3px solid var(--ink);
    --sh:     5px 5px 0 var(--ink);
    --sh-sm:  3px 3px 0 var(--ink);
    --r:      18px;
    /* study — warm peach/cream */
    --bg-s:   #fff8f0;
    --card-s: #fff0e0;
    --p1:     #ff8c69;
    --p2:     #ffd166;
    --p3:     #c9f0d0;
    /* break — soft sky */
    --bg-b:   #f0f6ff;
    --card-b: #dceeff;
    --b1:     #64b5f6;
    --b2:     #b39ddb;
    --b3:     #fff176;
    /* active set */
    --bg:     var(--bg-s);
    --card:   var(--card-s);
    --acc:    var(--p1);
    --acc2:   var(--p2);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;}

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 1.4s ease;
    position: relative;
  }

  /* ─ blobs ─ */
  .blobs { position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0; }
  .blob {
    position:absolute; border-radius:50%;
    filter:blur(70px); opacity:0.5;
    animation:drift 20s ease-in-out infinite;
    transition:background 1.4s ease;
  }
  .blob1{width:420px;height:420px;top:-100px;left:-100px;}
  .blob2{width:320px;height:320px;bottom:-80px;right:-80px;animation-delay:-7s;}
  .blob3{width:240px;height:240px;top:45%;left:62%;animation-delay:-14s;}
  @keyframes drift{
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(28px,-22px) scale(1.06);}
    66%{transform:translate(-18px,14px) scale(0.96);}
  }

  /* ─ WebGL canvas ─ */
  #bg-canvas{position:fixed;inset:0;z-index:1;opacity:0.2;pointer-events:none;}

  /* ─ floating deco shapes ─ */
  .deco{position:fixed;border:var(--bw);z-index:5;pointer-events:none;}
  .deco.star{
    width: 52px;
    height: 52px;
    top: 10%;
    left: 5%;
    animation: bob 7s ease-in-out infinite;
    background: none;
    border: none;
  }
  .deco.blob-shape{
    width:44px;height:44px;
    background:var(--p1);border-radius:50%;
    bottom:16%;right:6%;animation:bob 6s ease-in-out infinite -2s;
  }
  .deco.squig{
    width:54px;height:54px;
    background:var(--p3);
    border-radius:42% 58% 60% 40%/50% 38% 62% 50%;
    bottom:14%;left:5%;animation:bob 8s ease-in-out infinite -4s;
  }
  .deco.diamond{
    width:34px;height:34px;
    background:var(--p2);border-radius:4px;
    top:12%;right:5%;animation:bobR 7s ease-in-out infinite -1s;
    transform:rotate(45deg);
  }
  .deco.tri{
    width:0;height:0;background:none;border:none;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-bottom:36px solid var(--p3);
    top:72%;right:8%;animation:bob 9s ease-in-out infinite -6s;
    filter:drop-shadow(3px 3px 0 var(--ink));
  }
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  @keyframes bobR{0%,100%{transform:rotate(45deg) translateY(0);}50%{transform:rotate(50deg) translateY(-10px);}}

  /* ─ MAIN CARD ─ */
  .card{
    position:relative;z-index:10;
    background:var(--card);
    border:var(--bw);
    border-radius:var(--r);
    box-shadow:var(--sh);
    padding:32px 36px 28px;
    width:min(430px,94vw);
    display:flex;flex-direction:column;align-items:center;
    transition:background 1.4s ease;
    gap:0;
  }

  /* top bar */
  .topbar{
    width:100%;display:flex;
    align-items:center;justify-content:space-between;
    margin-bottom:20px;
  }
  .logo{
    font-family:'Fraunces',serif;
    font-style:italic;font-weight:300;
    font-size:1.4rem;letter-spacing:-0.01em;
  }
  .badge{
    background:var(--acc);
    border:var(--bw);border-radius:40px;
    box-shadow:var(--sh-sm);
    font-size:0.72rem;font-weight:800;
    letter-spacing:0.1em;text-transform:uppercase;
    padding:5px 14px;
    transition:background 1.4s ease;
  }

  /* round chips */
  .chips{display:flex;gap:8px;margin-bottom:22px;}
  .chip{
    width:44px;height:30px;
    border:var(--bw);border-radius:10px;
    background:white;box-shadow:var(--sh-sm);
    display:flex;align-items:center;justify-content:center;
    font-size:0.72rem;font-weight:900;
    opacity:0.32;transition:all 0.5s ease;
  }
  .chip.active{opacity:1;background:var(--acc);transition:background 1.4s ease,opacity 0.5s;}
  .chip.done{opacity:0.65;background:var(--p3);}
  .chip .ck{display:none;}
  .chip.done .ck{display:block;}
  .chip.done .nm{display:none;}

  /* ORB */
  .orb-wrap{
    position:relative;width:224px;height:224px;
    margin-bottom:20px;cursor:pointer;
  }
  .orb-wrap:hover .orb{transform:translate(-2px,-3px);box-shadow:8px 9px 0 var(--ink);}
  .orb-wrap:active .orb{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}

  .orb{
    width:100%;height:100%;
    border:var(--bw);border-radius:50%;
    background:white;box-shadow:var(--sh);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    transition:transform 0.15s,box-shadow 0.15s;
    position:relative;overflow:hidden;
  }

  /* liquid fill */
  .fill{
    position:absolute;bottom:0;left:0;right:0;
    background:var(--acc);opacity:0.18;
    transition:height 1s linear,background 1.4s ease;
    border-radius:0 0 50% 50%/0 0 28px 28px;
  }

  /* progress ring */
  .orb-ring{position:absolute;inset:8px;}
  .orb-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:rgba(26,26,46,0.07);stroke-width:5;}
  .ring-bar{
    fill:none;stroke:var(--acc);stroke-width:5;stroke-linecap:round;
    stroke-dasharray:580;stroke-dashoffset:0;
    transition:stroke-dashoffset 1s linear,stroke 1.4s ease;
  }

  /* small deco dots on orb */
  .orb-dot{position:absolute;border-radius:50%;border:2px solid var(--ink);opacity:0.15;}
  .od1{width:22px;height:22px;top:22px;right:26px;}
  .od2{width:12px;height:12px;bottom:28px;left:22px;}

  .orb-time{
    font-family:'Fraunces',serif;font-weight:600;
    font-size:3.2rem;line-height:1;letter-spacing:-0.02em;
    position:relative;z-index:2;
  }
  .orb-hint{
    font-size:0.66rem;font-weight:700;letter-spacing:0.12em;
    text-transform:uppercase;opacity:0.4;margin-top:5px;
    position:relative;z-index:2;
  }

  /* ─ BUTTONS ─ */
  .btn-row{display:flex;gap:10px;margin-bottom:20px;}
  .btn{
    font-family:'Nunito',sans-serif;font-weight:800;
    font-size:0.78rem;letter-spacing:0.05em;text-transform:uppercase;
    border:var(--bw);border-radius:12px;
    padding:10px 18px;cursor:pointer;
    box-shadow:var(--sh-sm);background:white;color:var(--ink);
    transition:transform 0.12s,box-shadow 0.12s;
  }
  .btn:hover{transform:translate(-1px,-2px);box-shadow:4px 5px 0 var(--ink);}
  .btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink);}
  .btn-primary{
    background:var(--acc);padding:10px 30px;font-size:0.82rem;
    transition:transform 0.12s,box-shadow 0.12s,background 1.4s ease;
  }
  .skip-icon {
    font-size: 1.8em;
    line-height: 0.5;
    vertical-align: middle;
    display: inline-block;
    margin-left: 2px;
  }

  /* ─ mood pills ─ */
  .mood{width:100%;display:flex;gap:8px;justify-content:center;}
  .mpill{
    border:var(--bw);border-radius:40px;
    padding:5px 12px;font-size:0.68rem;font-weight:700;
    background:white;box-shadow:var(--sh-sm);
    display:flex;align-items:center;gap:4px;
    opacity:0.38;transition:opacity 0.5s,background 0.5s;
  }
  .mpill.lit{opacity:1;background:var(--acc2);}

  /* ─ done overlay ─ */
  .done-ov{
    position:fixed;inset:0;z-index:50;
    background:rgba(255,248,240,0.9);
    backdrop-filter:blur(14px);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity 0.8s ease;
  }
  .done-ov.show{opacity:1;pointer-events:all;}
  .done-card{
    background:var(--card-s);
    border:var(--bw);border-radius:var(--r);
    box-shadow:var(--sh);
    padding:40px 52px;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:12px;
  }
  .done-emoji{font-size:3.2rem;line-height:1;}
  .done-card h2{font-family:'Fraunces',serif;font-weight:600;font-size:2.1rem;line-height:1.1;}
  .done-card p{font-size:0.8rem;font-weight:700;opacity:0.45;letter-spacing:0.07em;}

  /* wiggle */
  @keyframes wiggle{
    0%,100%{transform:rotate(0);}
    20%{transform:rotate(-2.5deg);}
    60%{transform:rotate(2.5deg);}
  }
  .wiggle{animation:wiggle 0.42s ease;}

  /* break mode colour vars */
  body.break-mode{
    --acc:  var(--b1);
    --acc2: var(--b2);
    --bg:   var(--bg-b);
    --card: var(--card-b);
  }
</style>
</head>
<body id="body">

<div class="blobs">
  <div class="blob blob1" id="b1" style="background:#ffb89a"></div>
  <div class="blob blob2" id="b2" style="background:#ffd99e"></div>
  <div class="blob blob3" id="b3" style="background:#c9f0d0"></div>
</div>

<canvas id="bg-canvas"></canvas>

<svg class="deco star" viewBox="0 0 100 100">
  <polygon points="50,8 61,35 90,35 68,54 75,85 50,68 25,85 32,54 10,35 39,35" fill="var(--p2)" stroke="var(--ink)" stroke-width="6" stroke-linejoin="round" />
</svg>
<div class="deco blob-shape"></div>
<div class="deco squig"></div>
<div class="deco diamond"></div>
<div class="deco tri"></div>

<div class="card" id="card">

  <div class="topbar">
    <div class="logo">pomo ✿</div>
    <div class="badge" id="badge">Study 📚</div>
  </div>

  <div class="chips" id="chips"></div>

  <div class="orb-wrap" onclick="handleClick()">
    <div class="orb" id="orb">
      <div class="fill" id="fill"></div>
      <div class="orb-ring">
        <svg viewBox="0 0 200 200">
          <circle class="ring-bg" cx="100" cy="100" r="92"/>
          <circle class="ring-bar" cx="100" cy="100" r="92" id="rbar"/>
        </svg>
      </div>
      <div class="orb-dot od1"></div>
      <div class="orb-dot od2"></div>
      <div class="orb-time" id="otime">10:00</div>
      <div class="orb-hint" id="ohint">tap to start</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="resetAll()">↺ Reset</button>
    <button class="btn btn-primary" id="bstart" onclick="handleClick()">▶ Start</button>
    <button class="btn" onclick="skipPhase()">Skip <span class="skip-icon">›</span></button>
  </div>

  <div class="mood">
    <div class="mpill" id="mf">🧠 focus</div>
    <div class="mpill" id="mb">🌿 breathe</div>
    <div class="mpill" id="md">✨ done</div>
  </div>

</div>

<div class="done-ov" id="done-ov">
  <div class="done-card">
    <div class="done-emoji">🌸</div>
    <h2>All done!</h2>
    <p>4 rounds · 40 min of focus</p>
    <button class="btn btn-primary" style="margin-top:10px"
      onclick="resetAll();document.getElementById('done-ov').classList.remove('show')">
      Start again ✿
    </button>
  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────
const ROUNDS=4, S_SECS=10*60, B_SECS=5*60;
const CIRC=2*Math.PI*92; // ≈578

let round=0, isStudy=true, total=S_SECS, left=S_SECS;
let running=false, ticker=null, allDone=false;

const badgeEl=document.getElementById('badge');
const otimeEl=document.getElementById('otime');
const ohintEl=document.getElementById('ohint');
const rbar=document.getElementById('rbar');
const fillEl=document.getElementById('fill');
const bstart=document.getElementById('bstart');
const cardEl=document.getElementById('card');
const doneOv=document.getElementById('done-ov');
const mf=document.getElementById('mf');
const mb=document.getElementById('mb');
const md=document.getElementById('md');

// ── chips ────────────────────────────────────────────────
function buildChips(){
  const ct=document.getElementById('chips');
  ct.innerHTML='';
  for(let i=0;i<ROUNDS;i++){
    const c=document.createElement('div');
    c.className='chip'+(i===round&&!allDone?' active':'')+(i<round||allDone?' done':'');
    c.innerHTML=`<span class="nm">${i+1}</span><span class="ck">✓</span>`;
    ct.appendChild(c);
  }
}

// ── ring+fill ────────────────────────────────────────────
function updateRing(){
  const pct=left/total;
  rbar.style.strokeDashoffset=CIRC*(1-pct);
  const m=String(Math.floor(left/60)).padStart(2,'0');
  const s=String(left%60).padStart(2,'0');
  otimeEl.textContent=`${m}:${s}`;
  fillEl.style.height=`${(1-pct)*38}%`;
}

// ── theme ────────────────────────────────────────────────
function setTheme(study){
  document.getElementById('body').classList.toggle('break-mode',!study);
  if(study){
    document.getElementById('b1').style.background='#ffb89a';
    document.getElementById('b2').style.background='#ffd99e';
    document.getElementById('b3').style.background='#c9f0d0';
    badgeEl.textContent='Study 📚';
    rbar.style.stroke='var(--p1)';
    fillEl.style.background='var(--p1)';
  } else {
    document.getElementById('b1').style.background='#90caf9';
    document.getElementById('b2').style.background='#ce93d8';
    document.getElementById('b3').style.background='#fff176';
    badgeEl.textContent='Break 🌿';
    rbar.style.stroke='var(--b1)';
    fillEl.style.background='var(--b1)';
  }
  mf.classList.toggle('lit',study&&running);
  mb.classList.toggle('lit',!study&&running);
  md.classList.remove('lit');
}

// ── wiggle ───────────────────────────────────────────────
function wiggle(){
  cardEl.classList.remove('wiggle');
  void cardEl.offsetWidth;
  cardEl.classList.add('wiggle');
  cardEl.addEventListener('animationend',()=>cardEl.classList.remove('wiggle'),{once:true});
}

// ── next phase ───────────────────────────────────────────
function nextPhase(){
  wiggle();
  if(isStudy){
    isStudy=false;total=B_SECS;left=B_SECS;
    setTheme(false);
    ohintEl.textContent='breathe ☁';
    chime('break');
  } else {
    round++;
    if(round>=ROUNDS){
      allDone=true;running=false;clearInterval(ticker);
      buildChips();
      md.classList.add('lit'); mf.classList.remove('lit'); mb.classList.remove('lit');
      doneOv.classList.add('show');
      return;
    }
    isStudy=true;total=S_SECS;left=S_SECS;
    setTheme(true);
    ohintEl.textContent='focus 🌸';
    chime('study');
  }
  updateRing(); buildChips();
}

function tick(){
  if(left<=0){nextPhase();return;}
  left--;updateRing();
}

// ── controls ─────────────────────────────────────────────
function handleClick(){
  if(allDone)return;
  if(!running){
    running=true;
    ticker=setInterval(tick,1000);
    bstart.textContent='⏸ Pause';
    ohintEl.textContent=isStudy?'focus 🌸':'breathe ☁';
    mf.classList.toggle('lit',isStudy);
    mb.classList.toggle('lit',!isStudy);
  } else {
    running=false;clearInterval(ticker);
    bstart.textContent='▶ Resume';
    ohintEl.textContent='paused ☕';
    mf.classList.remove('lit');mb.classList.remove('lit');
  }
}

function skipPhase(){
  clearInterval(ticker);running=false;
  left=0;nextPhase();
  if(!allDone){
    running=true;ticker=setInterval(tick,1000);
    bstart.textContent='⏸ Pause';
    mf.classList.toggle('lit',isStudy);
    mb.classList.toggle('lit',!isStudy);
  }
}

function resetAll(){
  clearInterval(ticker);running=false;allDone=false;
  round=0;isStudy=true;total=S_SECS;left=S_SECS;
  setTheme(true);
  rbar.style.strokeDashoffset=0;
  fillEl.style.height='0%';
  otimeEl.textContent='10:00';
  ohintEl.textContent='tap to start';
  bstart.textContent='▶ Start';
  mf.classList.remove('lit');mb.classList.remove('lit');md.classList.remove('lit');
  buildChips();
}

// ── audio ─────────────────────────────────────────────────
let actx=null;
function chime(type){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const ns=type==='study'?[523,659,784]:[659,784,988];
    ns.forEach((f,i)=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.connect(g);g.connect(actx.destination);
      o.type='sine';o.frequency.value=f;
      const t0=actx.currentTime+i*0.14;
      g.gain.setValueAtTime(0,t0);
      g.gain.linearRampToValueAtTime(0.065,t0+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t0+0.85);
      o.start(t0);o.stop(t0+0.95);
    });
  }catch(e){}
}

// ── WebGL bg — soft rounded orbs drifting ─────────────────
const cv=document.getElementById('bg-canvas');
const gl=cv.getContext('webgl');

function rsz(){cv.width=innerWidth;cv.height=innerHeight;if(gl)gl.viewport(0,0,cv.width,cv.height);}
window.addEventListener('resize',rsz);rsz();

if(gl){
  const vs=`attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
  const fs=`
    precision mediump float;
    uniform vec2 R;uniform float T;uniform float B;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*n(p);p*=2.;a*=.5;}return v;}
    float circ(vec2 p,float r){return length(p)-r;}
    float smin(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}

    void main(){
      vec2 uv=(gl_FragCoord.xy-.5*R)/min(R.x,R.y);
      float t=T*.1;

      // three drifting blob SDFs
      vec2 c1=vec2(cos(t*.45)*.28,  sin(t*.38)*.22);
      vec2 c2=vec2(sin(t*.52)*.22+.08, cos(t*.44)*.18-.08);
      vec2 c3=vec2(cos(t*.33+1.)*.18-.18, sin(t*.41+2.)*.24+.14);

      float d1=circ(uv-c1,.20);
      float d2=circ(uv-c2,.15);
      float d3=circ(uv-c3,.12);
      float d=smin(smin(d1,d2,.12),d3,.10);

      // bg noise wash
      float f=fbm(uv*1.5+t*.25)*.5+.5;

      // study warm / break cool
      vec3 warm=mix(vec3(.99,.92,.85),vec3(1.,.86,.70),f);
      vec3 cool=mix(vec3(.88,.94,1.),vec3(.91,.89,1.),f);
      vec3 bg=mix(warm,cool,B);

      // orb colour
      vec3 oc_w=mix(vec3(.99,.72,.52),vec3(1.,.87,.45),f);
      vec3 oc_c=mix(vec3(.55,.79,1.),vec3(.71,.63,1.),f);
      vec3 oc=mix(oc_w,oc_c,B);

      float mask=smoothstep(.04,-.10,d);
      vec3 col=mix(bg, mix(bg,oc,.5), mask*.45);

      // light vignette
      col*=mix(.86,1.,smoothstep(1.3,.3,length(uv)));

      gl_FragColor=vec4(clamp(col,0.,1.),1.);
    }
  `;
  function mk(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;}
  const pr=gl.createProgram();
  gl.attachShader(pr,mk(gl.VERTEX_SHADER,vs));
  gl.attachShader(pr,mk(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(pr);gl.useProgram(pr);
  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const ap=gl.getAttribLocation(pr,'p');
  gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,2,gl.FLOAT,false,0,0);
  const uR=gl.getUniformLocation(pr,'R');
  const uT=gl.getUniformLocation(pr,'T');
  const uB=gl.getUniformLocation(pr,'B');
  let tB=0,cB=0,t0=performance.now();
  function frame(now){
    tB=isStudy?0:1;cB+=(tB-cB)*.015;
    gl.uniform2f(uR,cv.width,cv.height);
    gl.uniform1f(uT,(now-t0)/1000);
    gl.uniform1f(uB,cB);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ── boot ─────────────────────────────────────────────────
rbar.style.strokeDasharray=CIRC;
rbar.style.strokeDashoffset=0;
rbar.style.stroke='var(--p1)';
fillEl.style.background='var(--p1)';
buildChips();
setTheme(true);
</script>
